<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6c63ff">
<title>IPTV Player</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f4fa.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
:root{--bg:#0f0f13;--sf:#1a1a24;--sf2:#22222f;--ac:#6c63ff;--ac2:#a78bfa;--tx:#e2e2f0;--mu:#7070a0;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none;}

/* ── Header ── */
#hd{background:var(--sf);border-bottom:1px solid #2a2a3f;padding:12px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
#hd h1{font-size:1.15rem;font-weight:700;color:var(--ac2);flex-shrink:0;white-space:nowrap;}
#hd h1 span{color:var(--ac);}
#search{flex:1;min-width:140px;background:var(--sf2);border:1px solid #2a2a3f;border-radius:8px;padding:7px 12px;color:var(--tx);font-size:.88rem;outline:none;transition:border-color .2s;}
#search:focus{border-color:var(--ac);}
#pl-row{display:flex;gap:8px;width:100%;align-items:center;}
#pl-sel{flex:1;background:var(--sf2);border:1px solid #2a2a3f;border-radius:8px;padding:7px 10px;color:var(--tx);font-size:.82rem;outline:none;cursor:pointer;}
#pl-sel:focus{border-color:var(--ac);}
#pl-sel option{background:var(--sf2);}
#pl-url{flex:1;background:var(--sf2);border:1px solid #2a2a3f;border-radius:8px;padding:7px 12px;color:var(--tx);font-size:.82rem;outline:none;}
#pl-url:focus{border-color:var(--ac);}
.btn-main{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:7px 15px;cursor:pointer;font-size:.85rem;font-weight:600;white-space:nowrap;transition:background .2s;}
.btn-main:hover{background:var(--ac2);}
#loading{display:none;font-size:.78rem;color:var(--mu);align-items:center;gap:6px;}
#loading.on{display:flex;}
.spinner{width:14px;height:14px;border:2px solid #2a2a3f;border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Groups bar ── */
#groups{display:flex;gap:7px;padding:10px 16px;overflow-x:auto;background:var(--sf);border-bottom:1px solid #2a2a3f;scrollbar-width:thin;}
#groups::-webkit-scrollbar{height:3px;}
#groups::-webkit-scrollbar-thumb{background:#2a2a3f;border-radius:2px;}
.gbtn{background:var(--sf2);border:1px solid #2a2a3f;color:var(--mu);border-radius:20px;padding:5px 14px;cursor:pointer;font-size:.8rem;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.gbtn:hover,.gbtn.active{background:var(--ac);border-color:var(--ac);color:#fff;}
#ch-count{font-size:.75rem;color:var(--mu);margin-left:auto;flex-shrink:0;align-self:center;}

/* ── Grid ── */
#content{padding:16px;}
.gsec{margin-bottom:28px;}
.gtitle{font-size:.85rem;font-weight:700;color:var(--ac2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2a2a3f;text-transform:uppercase;letter-spacing:.06em;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;}

/* ── Card ── */
.card{background:var(--sf);border:1px solid #2a2a3f;border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;}
.card:hover{transform:translateY(-3px);border-color:var(--ac);box-shadow:0 6px 20px rgba(108,99,255,.2);}
.lw{background:#12121a;height:76px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.lw img{max-height:60px;max-width:85%;object-fit:contain;}
.nl{font-size:1.7rem;color:var(--mu);}
.ci{padding:7px 9px;}
.cn{font-size:.76rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cm{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap;}
.bx{font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:4px;text-transform:uppercase;}
.b4k{background:#f59e0b;color:#000;}.bfhd{background:#10b981;color:#000;}
.bhd{background:#3b82f6;color:#fff;}.bsd{background:#6b7280;color:#fff;}
.bace{background:#7c3aed;color:#fff;}.bhttp{background:#0ea5e9;color:#fff;}
.bopts{font-size:.65rem;color:var(--mu);margin-left:auto;}

/* ── Load more ── */
#more-wrap{text-align:center;padding:16px 0;}
#more-btn{background:var(--sf2);border:1px solid #2a2a3f;color:var(--tx);border-radius:8px;padding:8px 22px;cursor:pointer;font-size:.85rem;}
#more-btn:hover{border-color:var(--ac);}

/* ── Modal ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:12px;}
.ov.open{display:flex;}
.modal{background:var(--sf);border:1px solid #2a2a3f;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}
.mhd{display:flex;align-items:center;gap:10px;padding:16px 18px 12px;border-bottom:1px solid #2a2a3f;flex-shrink:0;}
.mlogo{width:40px;height:40px;object-fit:contain;flex-shrink:0;}
.mtitle{font-size:.95rem;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mx{background:none;border:none;color:var(--mu);font-size:1.3rem;cursor:pointer;flex-shrink:0;line-height:1;padding:2px 6px;}
.mx:hover{color:var(--tx);}
/* Inline player */
#m-player{width:100%;background:#000;display:none;flex-direction:column;}
#m-video{width:100%;aspect-ratio:16/9;background:#000;}
#m-video-ctrl{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#0a0a10;}
#m-video-ctrl button{background:none;border:none;color:var(--tx);font-size:1rem;cursor:pointer;padding:2px 6px;border-radius:4px;}
#m-video-ctrl button:hover{background:#2a2a3f;}
#m-vol{width:70px;accent-color:var(--ac);}
#m-pstatus{font-size:.72rem;color:var(--mu);margin-left:auto;}
/* Streams list */
#m-streams{padding:12px 18px 18px;display:flex;flex-direction:column;gap:8px;}
.sr{background:var(--sf2);border:1px solid #2a2a3f;border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sl{font-size:.78rem;color:var(--mu);flex:1;min-width:80px;display:flex;align-items:center;gap:5px;}
.sb{border:none;border-radius:7px;padding:6px 11px;font-size:.76rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
.sb:hover{opacity:.82;}
.sb-play{background:#10b981;color:#fff;}
.sb-vlc{background:#e87c00;color:#fff;}
.sb-ace{background:#7c3aed;color:#fff;}
.sb-web{background:var(--ac);color:#fff;}
/* Platform hint */
#m-hint{padding:0 18px 14px;font-size:.74rem;color:var(--mu);line-height:1.5;}

/* ── Toast ── */
#toast{position:fixed;bottom:14px;right:14px;background:var(--sf);border:1px solid #2a2a3f;border-radius:9px;padding:9px 14px;font-size:.8rem;color:var(--ac2);display:none;z-index:300;max-width:280px;word-break:break-word;}

/* ── Empty ── */
#empty{text-align:center;padding:60px 20px;color:var(--mu);}
#empty .ei{font-size:2.8rem;margin-bottom:14px;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#2a2a3f;border-radius:3px;}

/* ── Responsive ── */
@media(max-width:500px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
  .lw{height:64px;}
}
</style>
</head>
<body>

<header id="hd">
  <h1>📺 <span>IPTV</span>Player</h1>
  <input id="search" type="search" placeholder="Buscar canal…" autocomplete="off">
  <div id="pl-row">
    <select id="pl-sel" title="Seleccionar lista predefinida"></select>
    <input id="pl-url" type="url" placeholder="O pega una URL de M3U…">
    <button class="btn-main" id="load-btn">Cargar</button>
  </div>
  <div id="loading"><div class="spinner"></div><span id="load-msg">Cargando…</span></div>
</header>

<div id="groups"></div>
<div id="content"><div id="empty"><div class="ei">📡</div><p>Selecciona una lista o pega una URL y pulsa <strong>Cargar</strong></p></div></div>

<div class="ov" id="overlay">
  <div class="modal">
    <div class="mhd">
      <img class="mlogo" id="m-logo" src="" alt="">
      <span class="mtitle" id="m-title"></span>
      <button class="mx" id="m-close">✕</button>
    </div>
    <div id="m-player">
      <video id="m-video" controls playsinline></video>
      <div id="m-video-ctrl">
        <button id="m-play">⏸</button>
        <button id="m-mute">🔊</button>
        <input id="m-vol" type="range" min="0" max="1" step="0.05" value="1">
        <span id="m-pstatus">—</span>
        <button id="m-pip" title="Picture in Picture">⧉</button>
        <button id="m-fs" title="Pantalla completa">⛶</button>
      </div>
    </div>
    <div id="m-streams"></div>
    <div id="m-hint"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const ACE_GW  = 'http://127.0.0.1:6878';
const PAGE_SZ = 200; // channels per page in large groups
const GROUP_ORDER = ['TODOS','LIGA DE CAMPEONES','DAZN','LIGA','TDT','DEPORTES','EUROSPORT','COPA DEL REY','SUPERCOPA','OTROS'];

// ── Logo map ─────────────────────────────────────────────────────────────────
const LOGOS = {
  'Liga De Campeones':  'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Liga%20De%20Campeones.png',
  'LaLigaTV':           'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20LaLiga%20TV.png',
  'LaLiga Hypermotion': 'https://commons.wikimedia.org/wiki/Special:FilePath/LaLiga_Hypermotion_2023_Vertical_Logo.svg',
  'DAZN LaLiga 2':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%20LaLiga%202.png',
  'DAZN LaLiga 3':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%20LaLiga%203.png',
  'DAZN LaLiga 4':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%20LaLiga%204.png',
  'DAZN LaLiga 5':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%20LaLiga%205.png',
  'DAZN LaLiga':        'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%20LaLiga.png',
  'DAZN F1':            'https://commons.wikimedia.org/wiki/Special:FilePath/Formula_1_logo.svg',
  'DAZN 1':             'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%201.png',
  'DAZN 2':             'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%202.png',
  'DAZN 3':             'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%203.png',
  'DAZN 4':             'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/DAZN%204.png',
  'M+ Deportes 7':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Deportes%207.png',
  'M+ Deportes 6':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Deportes%206.png',
  'M+ Deportes 5':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Deportes%205.png',
  'M+ Deportes 4':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Deportes%204.png',
  'M+ Deportes 3':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Deportes%203.png',
  'M+ Deportes 2':      'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Deportes%202.png',
  'M+ Deportes':        'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Deportes.png',
  'M+ #Vamos':          'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20%23Vamos.png',
  'M+ #0':              'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20%230.png',
  'M+ Golf':            'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Golf.png',
  'Movistar +':         'https://commons.wikimedia.org/wiki/Special:FilePath/Movistar_Plus%2B_2022_logo.svg',
  'La 1':               'https://commons.wikimedia.org/wiki/Special:FilePath/La_1_HD_TVE.png',
  'La 2':               'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/La%202.png',
  '24h':                'https://commons.wikimedia.org/wiki/Special:FilePath/Logo_Canal_24_horas.svg',
  'Telecinco':          'https://commons.wikimedia.org/wiki/Special:FilePath/Telecinco.svg',
  'Cuatro':             'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Cuatro.png',
  'Antena 3':           'https://commons.wikimedia.org/wiki/Special:FilePath/Logo_Antena_3_2025_(Naranja).svg',
  'La Sexta':           'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/La%20Sexta.png',
  'Mega':               'https://commons.wikimedia.org/wiki/Special:FilePath/MEGA.svg',
  'Teledeporte':        'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Teledeporte.png',
  'GOL PLAY':           'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Gol%20Play.png',
  'Real Madrid TV':     'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Real%20Madrid%20TV.png',
  'Barça TV':           'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Barca%20TV.png',
  'Eurosport 1':        'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Eurosport%201.png',
  'Eurosport 2':        'https://commons.wikimedia.org/wiki/Special:FilePath/Eurosport_2_Logo_2015.svg',
  'Eurosport 3':        'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Eurosport%203.png',
  'Eurosport 4':        'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Eurosport%204.png',
  'Copa':               'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Copa%20del%20Rey.png',
  'Supercopa':          'https://commons.wikimedia.org/wiki/Special:FilePath/Supercopa_de_Espana_logo.svg',
};

function resolveLogo(name, fb) {
  const n = name.toUpperCase();
  for (const [k, u] of Object.entries(LOGOS)) if (k.toUpperCase() === n) return u;
  for (const [k, u] of Object.entries(LOGOS)) if (n.includes(k.toUpperCase())) return u;
  return fb || '';
}

function imgErr(img) {
  const w = img.parentElement;
  if (w) w.innerHTML = '<span class="nl">📺</span>';
}

// ── State ────────────────────────────────────────────────────────────────────
let channels    = [];
let activeGroup = 'TODOS';
let searchQ     = '';
let pageOffset  = 0;
let hlsInst     = null;

// ── Web Worker ───────────────────────────────────────────────────────────────
let worker = null;
try { worker = new Worker('worker.js'); } catch (_) {}

function parseViaWorker(text) {
  return new Promise((res, rej) => {
    if (!worker) {
      // Fallback: inline parse (same logic)
      res(parseM3USync(text));
      return;
    }
    worker.onmessage = e => res(e.data.channels);
    worker.onerror   = ()  => res(parseM3USync(text));
    worker.postMessage({ text });
  });
}

// ── Inline fallback parser ────────────────────────────────────────────────────
function detectQ(n) {
  const u = n.toUpperCase();
  if (u.includes('4K') || u.includes('UHD'))   return '4K';
  if (u.includes('FHD') || u.includes('1080')) return 'FHD';
  if (u.includes(' HD') || u.includes('720'))  return 'HD';
  return 'SD';
}
function canonical(name) {
  return name
    .replace(/\s*(4K|UHD|FHD|1080p?|HD|720p?|SD|480p?)\s*$/i,'')
    .replace(/\s*\(Opci[oó]n\s*\d+\)\s*$/i,'')
    .replace(/\s*(Multi|M\d+)\s*$/i,'')
    .trim();
}
const GROUP_RULES = [
  [/^DAZN/i,'DAZN'],[/LIGA\s*DE\s*CAMPEONES|UEFA/i,'LIGA DE CAMPEONES'],
  [/COPA\s*DEL\s*REY|^COPA\s/i,'COPA DEL REY'],[/SUPERCOPA/i,'SUPERCOPA'],
  [/LALIGA|LALIGATV|HYPERMOTION/i,'LIGA'],[/M\+\s*(DEPORTE|DEPORTES)/i,'DEPORTES'],
  [/EUROSPORT/i,'EUROSPORT'],
  [/^(LA [12]|24H|TELECINCO|CUATRO|ANTENA|SEXTA|MEGA|TELEDEPORTE|GOL PLAY|REAL MADRID TV|BAR[CÇ]A TV|BARC|M\+\s*(GOLF|#|VAMOS)|TOROS|MOVISTAR)/i,'TDT'],
];
function reclassify(name, raw) {
  for (const [re,g] of GROUP_RULES) if (re.test(name)) return g;
  return raw.trim().toUpperCase() || 'OTROS';
}
function parseM3USync(text) {
  const lines = text.split(/\r?\n/); const result = []; let cur = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (/^#EXTINF/i.test(line)) {
      const norm = line.replace(/grupo-titulo/gi,'group-title').replace(/group-title\s*=/gi,'group-title=').replace(/tvg\s*-\s*(id|logo)/gi,m=>m.replace(/\s/g,''));
      const name   = (norm.match(/,(.+)$/) || [])[1]?.trim() || 'Canal';
      const logo   = (norm.match(/tvg-logo\s*=\s*"([^"]*)"/i) || [])[1] || '';
      const rawGrp = (norm.match(/group-title\s*=\s*"([^"]*)"/i) || [])[1] || 'OTROS';
      cur = { name, logo, group: reclassify(name, rawGrp), qual: detectQ(name) };
    } else if (cur && line && !line.startsWith('#')) {
      cur.url=line; cur.type=line.startsWith('acestream://')?'ace':'http';
      cur.cname=canonical(cur.name); result.push(cur); cur=null;
    }
  }
  return result;
}

function groupChannels(raw) {
  const map = new Map();
  for (const ch of raw) {
    const key = ch.group + '||' + ch.cname;
    if (!map.has(key)) map.set(key, { ...ch, logo: resolveLogo(ch.cname, ch.logo), streams: [ch] });
    else map.get(key).streams.push(ch);
  }
  return [...map.values()];
}

// ── Ordered groups ────────────────────────────────────────────────────────────
function orderedGroups(chs) {
  const present = new Set(chs.map(c=>c.group));
  const ord = GROUP_ORDER.filter(g => g==='TODOS' || present.has(g));
  const ext = [...present].filter(g=>!GROUP_ORDER.includes(g)).sort();
  return [...ord, ...ext];
}

// ── Render groups bar ─────────────────────────────────────────────────────────
function renderGroups() {
  const bar = document.getElementById('groups');
  const groups = orderedGroups(channels);
  bar.innerHTML = groups.map(g=>`<button class="gbtn${g===activeGroup?' active':''}" data-g="${g}">${g}</button>`).join('');
  const cnt = document.getElementById('ch-count');
  if(cnt) cnt.textContent = channels.length ? `${channels.length} canales` : '';
  bar.querySelectorAll('.gbtn').forEach(b=>b.addEventListener('click',()=>{
    activeGroup=b.dataset.g; pageOffset=0; renderContent();
    bar.querySelectorAll('.gbtn').forEach(x=>x.classList.toggle('active',x.dataset.g===activeGroup));
  }));
}

// ── Build card HTML ───────────────────────────────────────────────────────────
const QC = {'4K':'b4k','FHD':'bfhd','HD':'bhd','SD':'bsd'};
function buildCard(ch, idx) {
  const qc = QC[ch.qual]||'bsd';
  const tc = ch.type==='ace'?'bace':'bhttp';
  const tl = ch.type==='ace'?'ACE':'HTTP';
  const opts = ch.streams.length>1 ? `<span class="bopts">${ch.streams.length} opc.</span>` : '';
  const img = ch.logo
    ? `<img src="${ch.logo}" alt="" loading="lazy" onerror="imgErr(this)">`
    : '<span class="nl">📺</span>';
  return `<div class="card" data-i="${idx}">
    <div class="lw">${img}</div>
    <div class="ci">
      <div class="cn">${ch.cname}</div>
      <div class="cm"><span class="bx ${qc}">${ch.qual}</span><span class="bx ${tc}">${tl}</span>${opts}</div>
    </div>
  </div>`;
}

// ── Render content ────────────────────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('content');
  let list = channels;
  if (searchQ) {
    const s = searchQ.toLowerCase();
    list = channels.filter(c=>c.cname.toLowerCase().includes(s)||c.group.toLowerCase().includes(s));
  }
  const visible = activeGroup==='TODOS' ? list : list.filter(c=>c.group===activeGroup);
  if (!visible.length) {
    content.innerHTML = '<div id="empty"><div class="ei">🔍</div><p>Sin resultados</p></div>';
    return;
  }

  const secOrder = orderedGroups(visible).filter(g=>g!=='TODOS');
  const sections = Object.fromEntries(secOrder.map(g=>[g,[]]));
  for (const c of visible) if (sections[c.group]) sections[c.group].push(c);

  // Pagination for large TODOS/search views
  const isAll = activeGroup==='TODOS' || searchQ;
  const limit  = isAll ? PAGE_SZ + pageOffset : Infinity;
  let rendered = 0; let total = visible.length;

  let html = '';
  for (const g of secOrder) {
    const items = sections[g];
    if (!items.length) continue;
    const slice = isAll ? items.slice(0, Math.max(0, limit - rendered)) : items;
    if (isAll && slice.length === 0) break;
    rendered += slice.length;
    html += `<div class="gsec"><div class="gtitle">${g}</div><div class="grid">${
      slice.map(ch => buildCard(ch, channels.indexOf(ch))).join('')
    }</div></div>`;
    if (isAll && rendered >= limit) break;
  }

  const hasMore = isAll && rendered < total;
  html += hasMore ? `<div id="more-wrap"><button id="more-btn">Cargar más (${total-rendered} restantes)</button></div>` : '';
  content.innerHTML = html;
  content.querySelectorAll('.card').forEach(el=>el.addEventListener('click',()=>openModal(+el.dataset.i)));
  const mb = document.getElementById('more-btn');
  if (mb) mb.addEventListener('click',()=>{ pageOffset+=PAGE_SZ; renderContent(); });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(i) {
  const ch = channels[i];
  const logo = document.getElementById('m-logo');
  logo.src = ch.logo || ''; logo.style.display = ch.logo ? '' : 'none';
  logo.onerror = ()=>logo.style.display='none';
  document.getElementById('m-title').textContent = ch.cname;
  stopPlayer();

  const streamsDiv = document.getElementById('m-streams');
  streamsDiv.innerHTML = ch.streams.map((s,idx)=>{
    const isAce = s.type==='ace';
    const qc = QC[s.qual]||'bsd';
    const httpUrl = isAce ? `${ACE_GW}/ace/getstream?id=${s.url.replace('acestream://','')}`  : s.url;
    const canPlay = !isAce || true; // acestream via gateway if engine running
    const playBtn = `<button class="sb sb-play" data-action="play" data-stream="${idx}">▶ Ver</button>`;
    const vlcBtn  = `<button class="sb sb-vlc"  data-action="vlc"  data-stream="${idx}">🟠 VLC</button>`;
    const aceBtn  = isAce ? `<button class="sb sb-ace" data-action="ace" data-stream="${idx}">🟣 Ace</button>` : '';
    const webBtn  = !isAce ? `<button class="sb sb-web" data-action="web" data-stream="${idx}">🌐 Web</button>` : '';
    return `<div class="sr">
      <div class="sl"><span class="bx ${qc}">${s.qual}</span> Opción ${idx+1}</div>
      ${playBtn}${vlcBtn}${aceBtn}${webBtn}
    </div>`;
  }).join('');

  // Store streams ref on div
  streamsDiv.dataset.chIdx = i;

  // Platform hint
  const hasAce = ch.streams.some(s=>s.type==='ace');
  document.getElementById('m-hint').innerHTML = hasAce
    ? '<b>Acestream:</b> requiere AceStream Engine instalado. En Android usa la app oficial.<br><b>▶ Ver</b> usa el gateway local <code>:6878</code> si está activo.'
    : '';

  document.getElementById('overlay').classList.add('open');
}

// Stream actions via delegation
document.getElementById('m-streams').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const chIdx   = +btn.closest('#m-streams').dataset.chIdx;
  const sIdx    = +btn.dataset.stream;
  const ch      = channels[chIdx];
  const s       = ch.streams[sIdx];
  const isAce   = s.type === 'ace';
  const aceHash = isAce ? s.url.replace('acestream://','') : '';
  const httpUrl = isAce ? `${ACE_GW}/ace/getstream?id=${aceHash}` : s.url;
  const action  = btn.dataset.action;

  if (action === 'play') playInline(httpUrl, s.qual);
  if (action === 'vlc')  launchVLC(isAce ? `acestream://${aceHash}` : httpUrl);
  if (action === 'ace')  launchAce(aceHash);
  if (action === 'web')  openWeb(httpUrl);
});

// ── Inline HLS player ─────────────────────────────────────────────────────────
const playerDiv = document.getElementById('m-player');
const videoEl   = document.getElementById('m-video');
const pStatus   = document.getElementById('m-pstatus');

function playInline(url, qual) {
  stopPlayer();
  playerDiv.style.display = 'flex';
  pStatus.textContent = `${qual} — conectando…`;

  if (Hls.isSupported() && (url.includes('.m3u8') || url.includes('/ace/') || url.includes(':8080') || url.includes(':1935') || !url.includes('.'))) {
    hlsInst = new Hls({ enableWorker: true, lowLatencyMode: true });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(videoEl);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => { videoEl.play(); pStatus.textContent = `${qual} — en directo`; });
    hlsInst.on(Hls.Events.ERROR, (_,d) => { if (d.fatal) pStatus.textContent = '⚠️ Error de stream'; });
  } else if (videoEl.canPlayType('application/vnd.apple.mpegurl') || !url.includes('.m3u8')) {
    videoEl.src = url;
    videoEl.play().then(()=>pStatus.textContent=`${qual} — en directo`).catch(()=>pStatus.textContent='⚠️ No se pudo reproducir');
  } else {
    pStatus.textContent = '⚠️ Formato no soportado en este navegador';
  }
}

function stopPlayer() {
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
  videoEl.pause(); videoEl.src = '';
  playerDiv.style.display = 'none';
  pStatus.textContent = '—';
}

// Video controls
document.getElementById('m-play').addEventListener('click', () => {
  if (videoEl.paused) { videoEl.play(); document.getElementById('m-play').textContent = '⏸'; }
  else { videoEl.pause(); document.getElementById('m-play').textContent = '▶'; }
});
document.getElementById('m-mute').addEventListener('click', () => {
  videoEl.muted = !videoEl.muted;
  document.getElementById('m-mute').textContent = videoEl.muted ? '🔇' : '🔊';
});
document.getElementById('m-vol').addEventListener('input', e => { videoEl.volume = +e.target.value; });
document.getElementById('m-pip').addEventListener('click', () => { if(document.pictureInPictureEnabled) videoEl.requestPictureInPicture(); });
document.getElementById('m-fs').addEventListener('click',  () => { if(videoEl.requestFullscreen) videoEl.requestFullscreen(); });

// ── Launchers ─────────────────────────────────────────────────────────────────
function launchVLC(url) {
  // vlc:// scheme works on desktop (if registered) + Android/iOS VLC app
  const vlcUrl = `vlc://${url}`;
  window.location.href = vlcUrl;
  setTimeout(() => toast('🟠 Si VLC no se abre, inicia el stream desde VLC → Abrir URL'), 800);
}
function launchAce(hash) {
  window.location.href = `acestream://${hash}`;
  setTimeout(() => toast('🟣 Acestream: asegúrate de tener el motor instalado'), 800);
}
function openWeb(url) { window.open(url, '_blank'); toast('🌐 Abriendo en nueva pestaña…'); }

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, ms=3200) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none', ms);
}

// ── Close modal ───────────────────────────────────────────────────────────────
document.getElementById('m-close').addEventListener('click', ()=>{ stopPlayer(); document.getElementById('overlay').classList.remove('open'); });
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target===e.currentTarget){ stopPlayer(); e.currentTarget.classList.remove('open'); }});

// ── Load M3U ──────────────────────────────────────────────────────────────────
async function loadM3U(url) {
  if (!url) return;
  setLoading(true, 'Descargando lista…');
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    setLoading(true, 'Procesando canales…');
    const raw = await parseViaWorker(text);
    channels    = groupChannels(raw);
    activeGroup = 'TODOS';
    searchQ     = '';
    pageOffset  = 0;
    document.getElementById('search').value = '';
    renderGroups();
    renderContent();
    toast(`✅ ${raw.length} streams → ${channels.length} canales`);
  } catch(e) {
    toast('❌ ' + e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on, msg='') {
  const el = document.getElementById('loading');
  el.classList.toggle('on', on);
  if (msg) document.getElementById('load-msg').textContent = msg;
}

// ── Playlist selector ─────────────────────────────────────────────────────────
const FALLBACK_LISTS = [
  { name:'— Seleccionar lista —', description:'', url:'' },
  { name:'Mi lista ES 🇪🇸', description:'DAZN · LaLiga · Champions · TDT', url:'https://raw.githubusercontent.com/jesusparrat/effective-funicular/refs/heads/main/effective-funicular.m3u' },
  { name:'iptv-org España 🇪🇸', description:'~150 canales públicos', url:'https://iptv-org.github.io/iptv/countries/es.m3u' },
  { name:'iptv-org Deportes 🏆', description:'290+ canales deportivos', url:'https://iptv-org.github.io/iptv/categories/sports.m3u' },
  { name:'iptv-org Global 🌐', description:'20,000+ canales', url:'https://iptv-org.github.io/iptv/index.m3u' },
];

async function loadPlaylists() {
  const sel = document.getElementById('pl-sel');
  let lists = FALLBACK_LISTS;
  try {
    const r = await fetch('playlists.json');
    if (r.ok) {
      const data = await r.json();
      lists = [{ name:'— Seleccionar lista —', description:'', url:'' }, ...data];
    }
  } catch(_) {}
  sel.innerHTML = lists.map((p,i)=>`<option value="${p.url}" title="${p.description}">${p.name}</option>`).join('');
  sel.addEventListener('change', () => {
    const url = sel.value;
    if (!url) return;
    document.getElementById('pl-url').value = '';
    loadM3U(url);
  });
}

document.getElementById('load-btn').addEventListener('click', () => {
  const url = document.getElementById('pl-url').value.trim() || document.getElementById('pl-sel').value;
  loadM3U(url);
});
document.getElementById('pl-url').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('load-btn').click(); });

// ── Debounced search ──────────────────────────────────────────────────────────
let searchTimer = null;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = e.target.value.trim();
    pageOffset = 0;
    if (searchQ && activeGroup !== 'TODOS') { activeGroup='TODOS'; renderGroups(); }
    renderContent();
  }, 300);
});

// ── PWA Service Worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadPlaylists();
})();
</script>
