<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IPTV Player</title>
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
  <!-- La lógica principal aplazada para no bloquear el renderizado -->
  <script src="app.js" defer></script>
</head>
<body>

<div id="app">
  <header>
    <div class="logo"><span>IPTV</span> Player</div>
    <form id="url-form" onsubmit="return false">
      <input id="url-input" type="url" placeholder="https://ejemplo.com/lista.m3u" autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" id="btn-load-url">Cargar</button>
    </form>
  </header>

  <div id="body">
    <aside id="sidebar">
      <div id="sidebar-top">
        <input id="search-input" type="search" placeholder="Buscar canal…" autocomplete="off">
      </div>
      <div id="group-pills"></div>
      
      <!-- Contenedor con Scroll Infinito (Observer) -->
      <div id="channel-scroll-wrap">
        <div id="channel-list"></div>
        <div id="scroll-sentinel"></div>
      </div>
      
      <div id="sidebar-status">Carga una lista para empezar</div>
    </aside>

    <main id="main">
      <div id="player-wrap">
        <video id="video-el" controls playsinline webkit-playsinline></video>
        <div id="player-overlay">
          <div class="big-icon">📺</div>
          <div>Selecciona un canal para reproducir</div>
        </div>
        <div id="player-spinner" class="hidden"><div class="spinner"></div></div>
        <div id="player-error" class="hidden">
          <div class="err-icon">⚠️</div>
          <div class="err-text" id="player-error-text">Stream offline</div>
          <button class="btn btn-surface" style="margin-top:8px;" id="btn-retry">Reintentar</button>
        </div>
      </div>

      <div id="now-playing" class="empty">
        <img id="np-logo" src="" alt="" style="display:none">
        <div id="np-logo-fallback">📺</div>
        <div id="np-info">
          <div id="np-name">Sin canal activo</div>
          <div id="np-sub">Selecciona un canal</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-icon btn-surface" id="btn-fullscreen">⛶</button>
        </div>
      </div>
      
      <div style="padding:16px; color:var(--text2); text-align:center">
         <strong>Motor de Resiliencia Activado:</strong> Si un canal falla, saltará automáticamente al siguiente enlace disponible.<br><br>
         Pulsa (⋯) en una tarjeta para ver todas sus calidades.
      </div>
    </main>
  </div>
</div>

<!-- Modal -->
<div id="modal-backdrop">
  <div id="modal">
    <div id="modal-header">
      <img id="modal-logo" class="modal-logo-img" src="" alt="" style="display:none">
      <div id="modal-logo-fb" class="modal-logo-fb">📺</div>
      <div style="flex:1;min-width:0">
        <div id="modal-title" style="font-weight:bold"></div>
        <div id="modal-meta" style="font-size:0.8rem;color:var(--text2);margin-top:3px"></div>
      </div>
      <button class="btn btn-surface btn-icon" id="btn-close-modal">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>
</body>
</html>
