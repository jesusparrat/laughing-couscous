<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>IPTV Player</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="app">

  <!-- ── Top navigation bar ─────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo">📺 <span>IPTV</span></span>
    </div>
    <div class="topbar-center">
      <div id="url-form">
        <input id="url-input" type="url" inputmode="url" autocomplete="off" spellcheck="false"
               placeholder="Pega una URL de M3U…">
        <button class="btn btn-primary" id="btn-load-url">Cargar</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-surface btn-icon" id="btn-open-playlists" title="Mis listas">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Listas
      </button>
    </div>
  </header>

  <!-- ── Main body ──────────────────────────────────────── -->
  <div id="body">

    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside id="sidebar">
      <div id="sidebar-top">
        <div id="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="search" placeholder="Buscar canal…" autocomplete="off" spellcheck="false">
        </div>
      </div>

      <!-- Group pills -->
      <div id="group-pills" role="tablist" aria-label="Grupos de canales"></div>

      <!-- Channel list -->
      <div id="channel-scroll-wrap">
        <div id="channel-list" role="list"></div>
        <div id="scroll-sentinel" aria-hidden="true"></div>
      </div>

      <div id="sidebar-status" aria-live="polite">Carga una lista para empezar</div>
    </aside>

    <!-- ── Main panel ───────────────────────────────────── -->
    <main id="main">
      <!-- Player -->
      <div id="player-wrap">
        <video id="video-el" playsinline webkit-playsinline controls></video>

        <div id="player-overlay">
          <div class="big-icon">📺</div>
          <p>Selecciona un canal para reproducir</p>
        </div>

        <div id="player-spinner" class="hidden">
          <div class="spinner"></div>
        </div>

        <div id="player-error" class="hidden">
          <div class="err-icon">⚠️</div>
          <p id="player-error-text">Error al reproducir</p>
          <button class="btn btn-primary btn-sm" id="btn-retry">Reintentar</button>
        </div>

        <!-- Player controls overlay -->
        <div id="player-controls">
          <button class="ctrl-btn" id="btn-pip" title="Picture in Picture">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/><rect x="12" y="11" width="9" height="7" rx="1"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-fullscreen" title="Pantalla completa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Now playing -->
      <div id="now-playing" class="empty">
        <div class="np-logo-wrap">
          <img id="np-logo" src="" alt="" style="display:none">
          <span id="np-logo-fallback">📺</span>
        </div>
        <div id="np-info">
          <div id="np-name">Sin canal activo</div>
          <div id="np-sub">—</div>
        </div>
      </div>

      <!-- Content area below player -->
      <div id="content-area">
        <!-- placeholder for future sections / EPG -->
      </div>
    </main>
  </div>

  <!-- ── Channel modal ────────────────────────────────────── -->
  <div id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <div id="modal-header">
        <div class="modal-logo-wrap" id="modal-logo-wrap">
          <img class="modal-logo-img" id="modal-logo" src="" alt="">
          <span class="modal-logo-fb" id="modal-logo-fb" style="display:none">📺</span>
        </div>
        <div id="modal-heading">
          <h2 id="modal-title">Canal</h2>
          <p id="modal-meta"></p>
        </div>
        <button class="btn btn-surface btn-icon modal-close-btn" id="btn-close-modal" aria-label="Cerrar">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-hint"></div>
    </div>
  </div>

  <!-- ── Playlist picker overlay ──────────────────────────── -->
  <div id="playlist-overlay" role="dialog" aria-modal="true" aria-label="Seleccionar lista">
    <div id="playlist-panel">
      <div id="playlist-panel-header">
        <span>📋 Mis Listas</span>
        <button class="btn btn-surface btn-icon" id="btn-close-playlists" aria-label="Cerrar">✕</button>
      </div>
      <div id="playlist-grid"></div>
      <div id="playlist-panel-footer">
        <input id="playlist-url-input" type="url" inputmode="url" placeholder="O pega una URL de M3U aquí…">
        <button class="btn btn-primary" id="btn-load-playlist-url">Cargar</button>
      </div>
    </div>
  </div>

  <!-- ── Toast container ──────────────────────────────────── -->
  <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
